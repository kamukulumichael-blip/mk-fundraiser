name: Email Brief Dispatch

on:
  schedule:
    - cron: '0 4 * * 1'   # Monday 07:00 EAT — runs AFTER research.yml (avoids push race at 03:00 UTC)
    - cron: '0 3 * * 2-7' # Tue–Sun 06:00 EAT morning slot
    - cron: '0 10 * * *'  # 13:00 EAT afternoon slot (all days)
  workflow_dispatch:       # Manual trigger — useful for "send now"

permissions:
  contents: write

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic requests json-repair

      - name: Dispatch email brief
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY2 }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: python email_dispatch.py

      - name: Commit updated email config (last_sent)
        run: |
          git config user.name  "Raisr Email Bot"
          git config user.email "actions@github.com"
          git add data/email_config.json
          git diff --cached --quiet && echo "No changes to commit" || (git commit -m "email: brief dispatched [skip pages]" && git pull --rebase origin main && git push)
